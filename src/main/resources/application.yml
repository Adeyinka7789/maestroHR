spring:
  application:
    name: maestrohr

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

server:
  port: 8080

spring.jpa.open-in-view: false

logging:
  level:
    root: WARN
    com.admtechhub.maestrohr: DEBUG
    org.flywaydb: INFO
    org.springframework.web: INFO
  pattern:
    console: "%clr(%d{HH:mm:ss}){faint} %clr(%-5level) [%X{requestId:-na}/%X{tenantId:-na}] %clr(%-40.40logger{39}){cyan} : %msg%n"

security:
  jwt:
    secret: ${JWT_SECRET}
    expiry-ms: 86400000
    refresh-expiry-ms: 604800000

paystack:
  secret-key: ${PAYSTACK_SECRET_KEY}
  base-url: https://api.paystack.co
  callback-url: http://localhost:8080/api/webhooks/paystack
  client-id: ${PAYSTACK_CLIENT_ID:}
  client-secret: ${PAYSTACK_CLIENT_SECRET:}
  oauth-callback-url: ${PAYSTACK_OAUTH_CALLBACK:http://localhost:8080/api/payment/oauth/callback}
  webhook:
    verify-signature: false

disbursement:
  default-provider: CSV
  providers:
    PAYSTACK:
      enabled: true
    FLUTTERWAVE:
      enabled: false
    CSV:
      enabled: true

mail:
  host: ${MAIL_HOST}
  port: ${MAIL_PORT}
  username: ${MAIL_USERNAME}
  password: ${MAIL_PASSWORD}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true

termii:
  api-key: ${TERMII_API_KEY}
  sender-id: MaestroHR
  base-url: https://api.termii.com/api

sentry:
  enabled: false
  dsn: ${SENTRY_DSN}
  traces-sample-rate: 1.0
  exception-resolver-order: -2147483648