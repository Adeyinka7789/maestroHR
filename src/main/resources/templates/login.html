<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaestroHR — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#2563eb; --primary-dark:#1d4ed8; --text-main:#0f172a; --text-muted:#64748b; --bg-page:#f8fafc; --border:#e2e8f0; }
        * { -webkit-font-smoothing:antialiased; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg-page); min-height:100vh; display:flex; align-items:center; justify-content:center; margin:0; }
        .auth-container { width:100%; max-width:440px; padding:20px; }
        .card { background:white; border:1px solid var(--border); border-radius:20px; padding:40px; box-shadow:0 10px 25px -5px rgba(0,0,0,0.04),0 8px 10px -6px rgba(0,0,0,0.04); }
        .logo-header { display:flex; align-items:center; gap:12px; margin-bottom:32px; text-decoration:none; }
        .logo-box { width:36px; height:36px; background:var(--primary); border-radius:8px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        .logo-text { font-family:'Outfit',sans-serif; font-size:20px; font-weight:700; color:var(--text-main); }
        .form-label { display:block; font-size:14px; font-weight:600; color:var(--text-main); margin-bottom:8px; }
        .form-input { width:100%; padding:12px 16px; border:1px solid var(--border); border-radius:10px; font-size:15px; color:var(--text-main); background:#fff; transition:all 0.2s; outline:none; font-family:'Inter',sans-serif; }
        .form-input:focus { border-color:var(--primary); box-shadow:0 0 0 4px rgba(37,99,235,0.1); }
        .form-input::placeholder { color:#94a3b8; }
        .btn-primary { width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:10px; font-family:'Inter',sans-serif; }
        .btn-primary:hover:not(:disabled) { background:var(--primary-dark); transform:translateY(-1px); }
        .btn-primary:disabled { opacity:0.65; cursor:not-allowed; transform:none; }
        .error-box { background:#fef2f2; border:1px solid #fecaca; border-radius:8px; padding:12px 14px; color:#991b1b; font-size:14px; display:none; margin-bottom:24px; line-height:1.5; }
        .footer-link { text-align:center; margin-top:24px; font-size:14px; color:var(--text-muted); }
        .footer-link a { color:var(--primary); font-weight:600; text-decoration:none; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="card">
        <a href="/" class="logo-header">
            <div class="logo-box">
                <img src="/images/logo-sq.png" alt="MaestroHR" style="width:24px;height:24px;object-fit:contain;"
                     onerror="this.style.display='none'">
            </div>
            <span class="logo-text">MaestroHR</span>
        </a>

        <h1 style="font-family:'Outfit';font-size:26px;color:var(--text-main);margin:0 0 8px;">Welcome back</h1>
        <p style="font-size:15px;color:var(--text-muted);margin:0 0 32px;">Sign in to manage your workspace</p>

        <div class="error-box" id="error-box"></div>

        <div style="display:flex;flex-direction:column;gap:20px;">
            <div>
                <label class="form-label" for="email">Work Email</label>
                <input class="form-input" type="email" id="email" placeholder="name@company.com" autocomplete="email">
            </div>
            <div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                    <label class="form-label" for="password" style="margin:0;">Password</label>
                    <a href="/forgot-password" style="font-size:13px;color:var(--primary);text-decoration:none;font-weight:500;">Forgot?</a>
                </div>
                <div style="position:relative;">
                    <input class="form-input" type="password" id="password" placeholder="••••••••"
                           autocomplete="current-password" style="padding-right:45px;">
                    <button id="toggle-pw" type="button"
                            style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8;display:flex;padding:0;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <button class="btn-primary" id="login-btn" style="margin-top:8px;">
                <span id="btn-text">Sign in</span>
                <svg id="btn-spinner" style="display:none;animation:spin 0.8s linear infinite;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
                    <path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0" stroke-opacity="0.2"/>
                    <path d="M12 3a9 9 0 0 1 9 9"/>
                </svg>
            </button>
        </div>

        <div class="footer-link">Don't have an account? <a href="/register">Create workspace</a></div>
    </div>
    <p style="text-align:center;font-size:12px;color:#94a3b8;margin-top:32px;">&copy; 2026 MaestroHR Technologies. Built for Nigerian SMEs.</p>
</div>

<script>
    (function () {
        var emailInput = document.getElementById('email');
        var pwInput    = document.getElementById('password');
        var loginBtn   = document.getElementById('login-btn');
        var errorBox   = document.getElementById('error-box');
        var btnText    = document.getElementById('btn-text');
        var btnSpinner = document.getElementById('btn-spinner');

        document.getElementById('toggle-pw').addEventListener('click', function () {
            pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
        });

        [emailInput, pwInput].forEach(function (el) {
            el.addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });
        });

        loginBtn.addEventListener('click', doLogin);

        async function doLogin() {
            var email    = emailInput.value.trim();
            var password = pwInput.value;

            errorBox.style.display = 'none';

            if (!email || !password) {
                showError('Please enter your email and password.');
                return;
            }

            setLoading(true);

            try {
                var res    = await fetch('/api/auth/login', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ email: email, password: password })
                });

                var result = await res.json();

                // Log the full response so we can see the exact field names
                console.log('[MaestroHR] Login response:', JSON.stringify(result));

                if (!res.ok) {
                    showError(result.message || 'Invalid credentials. Please try again.');
                    return;
                }

                // Navigate the response — handle ApiResponse wrapper or flat response
                var payload = result.data || result;

                // Extract token — try every field name Spring Boot commonly uses
                var token = payload.accessToken
                         || payload.token
                         || payload.jwt
                         || payload.access_token
                         || null;

                if (!token) {
                    showError('Login succeeded but no token was returned. See console for details.');
                    console.error('[MaestroHR] Could not find token in:', JSON.stringify(payload));
                    return;
                }

                // Store everything
                localStorage.setItem('maestrohr_token',   token);
                localStorage.setItem('maestrohr_email',   payload.email       || email);
                localStorage.setItem('maestrohr_role',    payload.role        || '');
                localStorage.setItem('maestrohr_tenant',  payload.tenantId    || payload.tenant_id    || '');
                localStorage.setItem('maestrohr_company', payload.companyName || payload.company_name || '');

                // Also set as HTTP cookie so Spring web controllers can read it
                // on server-rendered page requests (no Authorization header in browser nav)
                var secure = window.location.protocol === 'https:' ? '; Secure' : '';
                document.cookie = 'maestrohr_token=' + encodeURIComponent(token)
                    + '; Path=/'
                    + '; Max-Age=' + (60 * 60 * 24 * 7)   // 7 days
                    + '; SameSite=Lax'
                    + secure;

                window.location.href = '/dashboard';

            } catch (err) {
                console.error('[MaestroHR] Login error:', err);
                showError('Connection error. Please check your internet and try again.');
            } finally {
                setLoading(false);
            }
        }

        function showError(msg) { errorBox.textContent = msg; errorBox.style.display = 'block'; }
        function setLoading(on) {
            loginBtn.disabled        = on;
            btnText.textContent      = on ? 'Authenticating...' : 'Sign in';
            btnSpinner.style.display = on ? 'block' : 'none';
        }
    })();
</script>
</body>
</html>
