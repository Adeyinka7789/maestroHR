<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}" lang="en">
<head><title>Departments</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <div>
            <h1 class="page-title">Departments</h1>
            <p class="page-subtitle">Define org structure and ownership boundaries.</p>
        </div>
        <button class="btn-primary" onclick="document.getElementById('department-modal').style.display='flex'">New Department</button>
    </div>

    <div class="card" style="overflow:hidden;">
        <table class="data-table" style="width:100%;border-collapse:collapse;">
            <thead><tr style="background:#f8fafc;border-bottom:1px solid #e2e8f0;"><th style="padding:12px 16px;text-align:left;">Department</th><th style="padding:12px 16px;text-align:left;">Employees</th><th style="padding:12px 16px;text-align:left;">Created</th><th style="padding:12px 16px;text-align:right;"></th></tr></thead>
            <tbody>
            <tr th:if="${departments.empty}"><td colspan="4" style="padding:48px 16px;text-align:center;color:#94a3b8;">No departments yet.</td></tr>
            <tr th:each="department : ${departments}" style="border-bottom:1px solid #f8fafc;">
                <td style="padding:14px 16px;font-weight:500;" th:text="${department.name}">Operations</td>
                <td style="padding:14px 16px;" th:text="${employeeRepository.findByDepartmentId(department.id).size()}">0</td>
                <td style="padding:14px 16px;color:#64748b;" th:text="${#temporals.format(department.createdAt, 'dd MMM yyyy')}">13 May 2026</td>
                <td style="padding:14px 16px;text-align:right;">
                    <button type="button" class="btn-secondary dept-edit-btn" th:data-id="${department.id}" th:data-name="${department.name}" style="font-size:12px;padding:5px 10px;">Edit</button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div id="department-modal" style="display:none;position:fixed;inset:0;background:rgba(15,23,42,0.45);z-index:50;align-items:center;justify-content:center;">
        <div class="card" style="width:min(480px,92vw);padding:24px;">
            <h2 style="margin:0 0 14px;font-size:18px;">Department</h2>
            <input type="hidden" id="departmentId">
            <label class="form-label" for="departmentName">Name</label>
            <input class="form-input" id="departmentName" placeholder="Engineering">
            <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:18px;">
                <button class="btn-secondary" onclick="document.getElementById('department-modal').style.display='none'">Cancel</button>
                <button class="btn-primary" id="department-save-btn">Save</button>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.dept-edit-btn').forEach(button => {
            button.addEventListener('click', () => {
                document.getElementById('departmentId').value = button.dataset.id;
                document.getElementById('departmentName').value = button.dataset.name;
                document.getElementById('department-modal').style.display = 'flex';
            });
        });

        document.getElementById('department-save-btn').addEventListener('click', async () => {
            const id = document.getElementById('departmentId').value;
            const name = document.getElementById('departmentName').value.trim();
            if (!name) return showToast('Department name is required.', 'error');

            const res = await apiCall(id ? `/api/departments/${id}` : '/api/departments', {
                method: id ? 'PUT' : 'POST',
                body: JSON.stringify({ name })
            });
            const data = await res.json();
            if (!res.ok) return showToast(data.error || data.message || 'Save failed.', 'error');
            showToast('Department saved.', 'success');
            setTimeout(() => window.location.reload(), 500);
        });
    </script>
</div>
</body>
</html>
