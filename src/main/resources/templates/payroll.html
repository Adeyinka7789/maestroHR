<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}" lang="en">
<head><title>Payroll</title></head>
<body>
<div layout:fragment="content">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
        <div class="card" style="padding:22px;">
            <div style="font-size:12px;color:#64748b;text-transform:uppercase;">Pending Approval</div>
            <div style="font-size:32px;font-weight:600;margin-top:8px;" th:text="${pendingApprovals}">0</div>
            <div style="margin-top:14px;color:#64748b;font-size:13px;">Runs waiting on approval or disbursement decisions.</div>
        </div>
        <div class="card" style="padding:22px;">
            <div style="display:flex;gap:10px;align-items:end;">
                <div style="flex:1;"><label class="form-label">Month</label><input class="form-input" id="payrollMonth" type="number" min="1" max="12"></div>
                <div style="flex:1;"><label class="form-label">Year</label><input class="form-input" id="payrollYear" type="number" min="2024" max="2099"></div>
                <button class="btn-primary" id="initiate-payroll-btn">Initiate</button>
            </div>
        </div>
    </div>

    <div class="card" style="overflow:hidden;">
        <table class="data-table" style="width:100%;border-collapse:collapse;">
            <thead><tr style="background:#f8fafc;border-bottom:1px solid #e2e8f0;"><th style="padding:12px 16px;text-align:left;">Period</th><th style="padding:12px 16px;text-align:left;">Status</th><th style="padding:12px 16px;text-align:left;">Net</th><th style="padding:12px 16px;text-align:left;">Initiated By</th><th style="padding:12px 16px;text-align:right;"></th></tr></thead>
            <tbody>
            <tr th:if="${payrollRuns.empty}"><td colspan="5" style="padding:48px 16px;text-align:center;color:#94a3b8;">No payroll runs yet.</td></tr>
            <tr th:each="run : ${payrollRuns}" style="border-bottom:1px solid #f8fafc;">
                <td style="padding:14px 16px;font-weight:500;" th:text="${run.period}">2026-05</td>
                <td style="padding:14px 16px;"><span class="badge" th:classappend="${run.status.name() == 'APPROVED'} ? ' badge-green' : (${run.status.name() == 'REJECTED'} ? ' badge-red' : (${run.status.name() == 'DRAFT'} ? ' badge-blue' : ' badge-amber'))" th:text="${run.status}">DRAFT</span></td>
                <td style="padding:14px 16px;" th:text="${'₦' + #numbers.formatDecimal(run.totalNet / 100, 0, 'COMMA', 0, 'POINT')}">₦0</td>
                <td style="padding:14px 16px;" th:text="${run.initiatedBy != null ? run.initiatedBy.email : '-'}">admin@company.com</td>
                <td style="padding:14px 16px;text-align:right;"><a class="btn-secondary" th:href="'/payroll/' + ${run.id}" style="font-size:12px;padding:5px 10px;">Open</a></td>
            </tr>
            </tbody>
        </table>
    </div>

    <script>
        const now = new Date();
        document.getElementById('payrollMonth').value = now.getMonth() + 1;
        document.getElementById('payrollYear').value = now.getFullYear();

        document.getElementById('initiate-payroll-btn').addEventListener('click', async () => {
            const month = document.getElementById('payrollMonth').value;
            const year = document.getElementById('payrollYear').value;
            const res = await apiCall(`/api/payroll/initiate?month=${month}&year=${year}`, { method: 'POST' });
            const data = await res.json();
            if (!res.ok) return showToast(data.error || data.message || 'Payroll initiation failed.', 'error');
            showToast('Payroll initiated.', 'success');
            setTimeout(() => window.location.reload(), 600);
        });
    </script>
</div>
</body>
</html>
