<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}" lang="en">
<head><title>Subscribers</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <div>
            <h1 class="page-title">Subscribers</h1>
            <p class="page-subtitle">Tenant portfolio, subscription plans, and account posture.</p>
        </div>
        <a href="/admin" class="btn-secondary">Open Admin Console</a>
    </div>

    <div class="card" style="padding:16px;margin-bottom:16px;">
        <div style="display:grid;grid-template-columns:1fr 180px 180px;gap:10px;">
            <input class="form-input" id="subscriber-filter" placeholder="Filter by company, industry, RC, or plan">
            <select class="form-input" id="subscriber-status-filter"><option value="">All statuses</option><option value="Active">Active</option><option value="Inactive">Inactive</option></select>
            <select class="form-input" id="subscriber-plan-filter"><option value="">All plans</option><option value="FREE_TRIAL">FREE_TRIAL</option><option value="BASIC">BASIC</option><option value="PROFESSIONAL">PROFESSIONAL</option><option value="ENTERPRISE">ENTERPRISE</option></select>
        </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:16px;">
        <div class="stat-card"><div style="font-size:12px;color:#64748b;text-transform:uppercase;">Subscribers</div><div style="font-size:30px;font-weight:600;margin-top:8px;" th:text="${tenants.size()}">0</div></div>
        <div class="stat-card"><div style="font-size:12px;color:#64748b;text-transform:uppercase;">Active</div><div style="font-size:30px;font-weight:600;margin-top:8px;" th:text="${activeSubscribers}">0</div></div>
        <div class="stat-card"><div style="font-size:12px;color:#64748b;text-transform:uppercase;">Trials</div><div style="font-size:30px;font-weight:600;margin-top:8px;" th:text="${trialSubscribers}">0</div></div>
        <div class="stat-card"><div style="font-size:12px;color:#64748b;text-transform:uppercase;">Users</div><div style="font-size:30px;font-weight:600;margin-top:8px;" th:text="${users.size()}">0</div></div>
    </div>

    <div class="card" style="overflow:hidden;">
        <table class="data-table" style="width:100%;border-collapse:collapse;">
            <thead><tr style="background:#f8fafc;border-bottom:1px solid #e2e8f0;"><th style="padding:12px 16px;text-align:left;">Company</th><th style="padding:12px 16px;text-align:left;">Industry</th><th style="padding:12px 16px;text-align:left;">Plan</th><th style="padding:12px 16px;text-align:left;">Status</th><th style="padding:12px 16px;text-align:left;">Expires</th><th style="padding:12px 16px;text-align:left;">RC</th></tr></thead>
            <tbody>
            <tr th:if="${tenants.empty}"><td colspan="6" style="padding:48px 16px;text-align:center;color:#94a3b8;">No subscribers found.</td></tr>
            <tr th:each="tenant : ${tenants}" class="subscriber-row" style="border-bottom:1px solid #f8fafc;"
                th:data-search="${#strings.toLowerCase(tenant.companyName + ' ' + tenant.industry + ' ' + (tenant.rcNumber != null ? tenant.rcNumber : '') + ' ' + tenant.subscriptionPlan.name())}"
                th:data-status="${tenant.active ? 'Active' : 'Inactive'}"
                th:data-plan="${tenant.subscriptionPlan.name()}">
                <td style="padding:14px 16px;font-weight:600;" th:text="${tenant.companyName}">Company</td>
                <td style="padding:14px 16px;" th:text="${tenant.industry + ' · ' + tenant.companySize}">Industry</td>
                <td style="padding:14px 16px;" th:text="${tenant.subscriptionPlan}">FREE_TRIAL</td>
                <td style="padding:14px 16px;"><span class="badge" th:classappend="${tenant.active} ? ' badge-green' : ' badge-gray'" th:text="${tenant.active} ? 'Active' : 'Inactive'">Active</span></td>
                <td style="padding:14px 16px;" th:text="${#temporals.format(tenant.subscriptionExpiresAt, 'dd MMM yyyy')}">14 Jun 2026</td>
                <td style="padding:14px 16px;" th:text="${tenant.rcNumber != null ? tenant.rcNumber : '—'}">—</td>
            </tr>
            </tbody>
        </table>
    </div>

    <script>
        const subscriberFilter = document.getElementById('subscriber-filter');
        const subscriberStatusFilter = document.getElementById('subscriber-status-filter');
        const subscriberPlanFilter = document.getElementById('subscriber-plan-filter');

        function filterSubscribers() {
            const query = subscriberFilter.value.trim().toLowerCase();
            const status = subscriberStatusFilter.value;
            const plan = subscriberPlanFilter.value;
            document.querySelectorAll('.subscriber-row').forEach(row => {
                const matchesQuery = !query || row.dataset.search.includes(query);
                const matchesStatus = !status || row.dataset.status === status;
                const matchesPlan = !plan || row.dataset.plan === plan;
                row.style.display = matchesQuery && matchesStatus && matchesPlan ? '' : 'none';
            });
        }

        [subscriberFilter, subscriberStatusFilter, subscriberPlanFilter].forEach(el => el.addEventListener('input', filterSubscribers));
    </script>
</div>
</body>
</html>
