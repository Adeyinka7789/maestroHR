<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}" lang="en">
<head><title>Payroll Detail</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <div>
            <h1 class="page-title" th:text="${'Payroll ' + payrollRun.period}">Payroll</h1>
            <p class="page-subtitle" th:text="${payrollRun.status}">DRAFT</p>
        </div>
        <div style="display:flex;gap:10px;">
            <button class="btn-secondary" id="compute-payroll-btn" th:data-id="${payrollRun.id}" th:if="${payrollRun.editable}">Compute</button>
            <button class="btn-primary" id="submit-payroll-btn" th:data-id="${payrollRun.id}" th:if="${payrollRun.canSubmit()}">Submit</button>
            <button class="btn-primary" id="disburse-payroll-btn" th:data-id="${payrollRun.id}" th:if="${payrollRun.status.name() == 'APPROVED'}">Disburse</button>
        </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:16px;">
        <div class="stat-card"><div style="font-size:12px;color:#64748b;text-transform:uppercase;">Gross</div><div style="font-size:28px;font-weight:600;margin-top:8px;" th:text="${'₦' + #numbers.formatDecimal(payrollRun.totalGross / 100, 0, 'COMMA', 0, 'POINT')}">₦0</div></div>
        <div class="stat-card"><div style="font-size:12px;color:#64748b;text-transform:uppercase;">Net</div><div style="font-size:28px;font-weight:600;margin-top:8px;" th:text="${'₦' + #numbers.formatDecimal(payrollRun.totalNet / 100, 0, 'COMMA', 0, 'POINT')}">₦0</div></div>
        <div class="stat-card"><div style="font-size:12px;color:#64748b;text-transform:uppercase;">PAYE</div><div style="font-size:28px;font-weight:600;margin-top:8px;" th:text="${'₦' + #numbers.formatDecimal(payrollRun.totalPaye / 100, 0, 'COMMA', 0, 'POINT')}">₦0</div></div>
        <div class="stat-card"><div style="font-size:12px;color:#64748b;text-transform:uppercase;">NHF</div><div style="font-size:28px;font-weight:600;margin-top:8px;" th:text="${'₦' + #numbers.formatDecimal(payrollRun.totalNhf / 100, 0, 'COMMA', 0, 'POINT')}">₦0</div></div>
    </div>

    <div class="card" style="overflow:hidden;">
        <table class="data-table" style="width:100%;border-collapse:collapse;">
            <thead><tr style="background:#f8fafc;border-bottom:1px solid #e2e8f0;"><th style="padding:12px 16px;text-align:left;">Employee</th><th style="padding:12px 16px;text-align:left;">Gross</th><th style="padding:12px 16px;text-align:left;">Deductions</th><th style="padding:12px 16px;text-align:left;">Net</th><th style="padding:12px 16px;text-align:left;">Transfer</th></tr></thead>
            <tbody>
            <tr th:if="${entries.empty}"><td colspan="5" style="padding:48px 16px;text-align:center;color:#94a3b8;">No entries generated yet.</td></tr>
            <tr th:each="entry : ${entries}" style="border-bottom:1px solid #f8fafc;">
                <td style="padding:14px 16px;font-weight:500;" th:text="${entry.employee.fullName}">Name</td>
                <td style="padding:14px 16px;" th:text="${'₦' + #numbers.formatDecimal(entry.grossSalary / 100, 0, 'COMMA', 0, 'POINT')}">₦0</td>
                <td style="padding:14px 16px;" th:text="${'₦' + #numbers.formatDecimal((entry.payeTax + entry.pensionEmployee + entry.nhfDeduction + entry.otherDeductions) / 100, 0, 'COMMA', 0, 'POINT')}">₦0</td>
                <td style="padding:14px 16px;" th:text="${'₦' + #numbers.formatDecimal(entry.netSalary / 100, 0, 'COMMA', 0, 'POINT')}">₦0</td>
                <td style="padding:14px 16px;"><span class="badge" th:classappend="${entry.transferStatus.name() == 'SUCCESS'} ? ' badge-green' : (${entry.transferStatus.name() == 'FAILED'} ? ' badge-red' : ' badge-amber')" th:text="${entry.transferStatus}">PENDING</span></td>
            </tr>
            </tbody>
        </table>
    </div>

    <script>
        async function runPayrollAction(path, successMessage) {
            const res = await apiCall(path, { method: 'POST' });
            const data = await res.json();
            if (!res.ok) return showToast(data.error || data.message || 'Action failed.', 'error');
            showToast(successMessage, 'success');
            setTimeout(() => window.location.reload(), 600);
        }
        const computeBtn = document.getElementById('compute-payroll-btn');
        const submitBtn = document.getElementById('submit-payroll-btn');
        const disburseBtn = document.getElementById('disburse-payroll-btn');
        if (computeBtn) computeBtn.addEventListener('click', () => runPayrollAction(`/api/payroll/${computeBtn.dataset.id}/compute`, 'Payroll computed.'));
        if (submitBtn) submitBtn.addEventListener('click', () => runPayrollAction(`/api/payroll/${submitBtn.dataset.id}/submit`, 'Payroll submitted.'));
        if (disburseBtn) disburseBtn.addEventListener('click', () => runPayrollAction(`/api/payroll/${disburseBtn.dataset.id}/disburse`, 'Salary disbursement initiated.'));
    </script>
</div>
</body>
</html>
