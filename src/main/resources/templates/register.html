<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaestroHR — Create Your Workspace</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/logo-sq.png">
    <link rel="apple-touch-icon" href="/images/logo-sq.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --bg-page: #f8fafc;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-page); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }

        /* Navigation Header */
        .header { padding: 32px; display: flex; justify-content: center; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
        .logo-box { width: 34px; height: 34px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .logo-text { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 20px; }

        /* Main Container */
        .container { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 20px 20px 80px; }
        .form-card { width: 100%; max-width: 520px; background: white; padding: 48px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 10px 15px -3px rgba(0,0,0,0.05); }

        .title { font-family: 'Outfit', sans-serif; font-size: 28px; margin: 0 0 8px; text-align: center; }
        .subtitle { color: var(--text-muted); font-size: 15px; margin-bottom: 40px; text-align: center; }

        /* Form Layout */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .span-full { grid-column: 1 / -1; }

        .label { display: block; font-size: 14px; font-weight: 600; color: var(--text-main); margin-bottom: 8px; }
        .input { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); background: #fff; color: var(--text-main); outline: none; transition: 0.2s; font-size: 15px; font-family: inherit; }
        .input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: var(--primary); color: white; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.2s; margin-top: 12px; }
        .btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .error-box { display: none; margin-bottom: 24px; padding: 14px; border-radius: 10px; background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; font-size: 14px; text-align: center; }

        .footer-text { text-align: center; margin-top: 32px; font-size: 14px; color: var(--text-muted); }
        .footer-text a { color: var(--primary); font-weight: 600; text-decoration: none; }

        @media (max-width: 640px) {
            .form-card { padding: 32px 24px; border: none; background: transparent; box-shadow: none; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header class="header">
    <a href="/" class="logo">
        <div class="logo-box">
            <img src="/images/logo-sq.png" alt="Logo" style="width: 22px; height: 22px; object-fit: contain;">
        </div>
        <span class="logo-text">MaestroHR</span>
    </a>
</header>

<main class="container">
    <div class="form-card">
        <h1 class="title">Create Workspace</h1>
        <p class="subtitle">Setup your organization and automate your payroll.</p>

        <div id="error-box" class="error-box"></div>

        <div class="form-grid">
            <div class="span-full">
                <label class="label" for="companyName">Company Name</label>
                <input class="input" id="companyName" placeholder="e.g. ADM Tech Hub">
            </div>

            <div>
                <label class="label" for="rcNumber">RC Number</label>
                <input class="input" id="rcNumber" placeholder="RC-123456">
            </div>

            <div>
                <label class="label" for="companySize">Team Size</label>
                <select class="input" id="companySize">
                    <option value="">Select size</option>
                    <option>1-10</option>
                    <option>11-50</option>
                    <option>51-200</option>
                    <option>201-500</option>
                </select>
            </div>

            <div class="span-full">
                <label class="label" for="industry">Industry</label>
                <input class="input" id="industry" placeholder="e.g. Technology, Agriculture">
            </div>

            <div class="span-full">
                <label class="label" for="adminEmail">Work Email</label>
                <input class="input" id="adminEmail" type="email" placeholder="name@company.com">
            </div>

            <div class="span-full">
                <label class="label" for="password">Password</label>
                <input class="input" id="password" type="password" placeholder="Min. 8 characters">
            </div>

            <div class="span-full">
                <button id="register-btn" class="btn">Create account</button>
            </div>
        </div>

        <p class="footer-text">
            Already have a workspace? <a href="/login">Sign in</a>
        </p>
    </div>
</main>

<script>
    // Logic remains the same as your previous version to maintain functionality
    const fields = ['companyName', 'rcNumber', 'industry', 'companySize', 'adminEmail', 'password'];
    const errorBox = document.getElementById('error-box');

    function persistAuthCookie(token) {
        const secureFlag = window.location.protocol === 'https:' ? '; Secure' : '';
        document.cookie = `maestrohr_token=${encodeURIComponent(token)}; Path=/; Max-Age=${60 * 60 * 24 * 7}; SameSite=Lax${secureFlag}`;
    }

    document.getElementById('register-btn').addEventListener('click', async () => {
        const payload = Object.fromEntries(fields.map(id => [id, document.getElementById(id).value.trim()]));

        if (!payload.companyName || !payload.industry || !payload.companySize || !payload.adminEmail || !payload.password) {
            errorBox.textContent = 'Please fill in all required fields.';
            errorBox.style.display = 'block';
            return;
        }

        errorBox.style.display = 'none';
        const button = document.getElementById('register-btn');
        button.disabled = true;
        button.textContent = 'Provisioning workspace...';

        try {
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            if (!res.ok) {
                errorBox.textContent = data.error || data.message || 'Registration failed.';
                errorBox.style.display = 'block';
                return;
            }

            const auth = data.data || {};
            localStorage.setItem('maestrohr_token', auth.accessToken || '');
            localStorage.setItem('maestrohr_email', auth.email || payload.adminEmail);
            localStorage.setItem('maestrohr_tenant', auth.tenantId || '');
            localStorage.setItem('maestrohr_company', auth.companyName || payload.companyName);
            persistAuthCookie(auth.accessToken || '');
            window.location.href = '/dashboard';
        } catch (error) {
            errorBox.textContent = 'Connection error. Please check your network.';
            errorBox.style.display = 'block';
        } finally {
            button.disabled = false;
            button.textContent = 'Create account';
        }
    });
</script>
</body>
</html>
