<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}" lang="en">
<head><title>Attendance</title></head>
<body>
<div layout:fragment="content">
    <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-bottom:16px;">
        <div class="stat-card"><div style="font-size:12px;color:#64748b;text-transform:uppercase;">Present</div><div style="font-size:30px;font-weight:600;margin-top:8px;" th:text="${presentCount}">0</div></div>
        <div class="stat-card"><div style="font-size:12px;color:#64748b;text-transform:uppercase;">Late</div><div style="font-size:30px;font-weight:600;margin-top:8px;" th:text="${lateCount}">0</div></div>
        <div class="stat-card"><div style="font-size:12px;color:#64748b;text-transform:uppercase;">Absent</div><div style="font-size:30px;font-weight:600;margin-top:8px;" th:text="${absentCount}">0</div></div>
    </div>

    <div class="card" style="overflow:hidden;">
        <div style="padding:18px 20px;border-bottom:1px solid #e2e8f0;">
            <div style="font-size:18px;font-weight:600;">Today</div>
            <div style="font-size:13px;color:#64748b;" th:text="${#temporals.format(today, 'dd MMM yyyy')}">13 May 2026</div>
        </div>
        <table class="data-table" style="width:100%;border-collapse:collapse;">
            <thead><tr style="background:#f8fafc;border-bottom:1px solid #e2e8f0;"><th style="padding:12px 16px;text-align:left;">Employee</th><th style="padding:12px 16px;text-align:left;">Clock In</th><th style="padding:12px 16px;text-align:left;">Clock Out</th><th style="padding:12px 16px;text-align:left;">Hours</th><th style="padding:12px 16px;text-align:left;">Status</th></tr></thead>
            <tbody>
            <tr th:if="${records.empty}"><td colspan="5" style="padding:48px 16px;text-align:center;color:#94a3b8;">No attendance records for today.</td></tr>
            <tr th:each="record : ${records}" style="border-bottom:1px solid #f8fafc;">
                <td style="padding:14px 16px;font-weight:500;" th:text="${record.employee.fullName}">Name</td>
                <td style="padding:14px 16px;" th:text="${record.clockInTime != null ? record.clockInTime : '-'}">08:05</td>
                <td style="padding:14px 16px;" th:text="${record.clockOutTime != null ? record.clockOutTime : '-'}">17:24</td>
                <td style="padding:14px 16px;" th:text="${record.hoursWorked != null ? record.hoursWorked : '-'}">8.0</td>
                <td style="padding:14px 16px;"><span class="badge" th:classappend="${record.status.name() == 'PRESENT'} ? ' badge-green' : (${record.status.name() == 'ABSENT'} ? ' badge-red' : ' badge-amber')" th:text="${record.status}">PRESENT</span></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
