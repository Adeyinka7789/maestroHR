<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}" lang="en">
<head><title>Leave</title></head>
<body>
<div layout:fragment="content">
    <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:16px;margin-bottom:16px;">
        <div class="card" style="padding:22px;">
            <div style="font-size:12px;color:#64748b;text-transform:uppercase;">Pending Requests</div>
            <div style="font-size:32px;font-weight:600;margin-top:8px;" th:text="${pendingCount}">0</div>
            <div style="margin-top:14px;color:#64748b;font-size:13px;">Recent requests and quick actions for managers.</div>
        </div>
        <div class="card" style="padding:22px;">
            <div style="font-size:12px;color:#64748b;text-transform:uppercase;">Apply for Leave</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;">
                <select class="form-input" id="leaveEmployeeId"><option value="">Employee</option><option th:each="employee : ${employees}" th:value="${employee.id}" th:text="${employee.fullName}">Name</option></select>
                <select class="form-input" id="leaveTypeId"><option value="">Leave type</option><option th:each="type : ${leaveTypes}" th:value="${type.id}" th:text="${type.name}">Annual</option></select>
                <input class="form-input" id="leaveStartDate" type="date">
                <input class="form-input" id="leaveEndDate" type="date">
                <input class="form-input" id="leaveReason" placeholder="Reason" style="grid-column:1 / -1;">
            </div>
            <button class="btn-primary" id="leave-apply-btn" style="margin-top:12px;">Submit request</button>
        </div>
    </div>

    <div class="card" style="padding:0;overflow:hidden;">
        <table class="data-table" style="width:100%;border-collapse:collapse;">
            <thead><tr style="background:#f8fafc;border-bottom:1px solid #e2e8f0;"><th style="padding:12px 16px;text-align:left;">Employee</th><th style="padding:12px 16px;text-align:left;">Type</th><th style="padding:12px 16px;text-align:left;">Window</th><th style="padding:12px 16px;text-align:left;">Status</th><th style="padding:12px 16px;text-align:right;"></th></tr></thead>
            <tbody>
            <tr th:if="${leaveRequests.empty}"><td colspan="5" style="padding:48px 16px;text-align:center;color:#94a3b8;">No leave requests available.</td></tr>
            <tr th:each="request : ${leaveRequests}" style="border-bottom:1px solid #f8fafc;">
                <td style="padding:14px 16px;">
                    <div style="font-weight:500;" th:text="${request.employee.fullName}">Name</div>
                    <div style="font-size:12px;color:#64748b;" th:text="${request.reason}">Reason</div>
                </td>
                <td style="padding:14px 16px;" th:text="${request.leaveType.name}">Annual</td>
                <td style="padding:14px 16px;" th:text="${#temporals.format(request.startDate, 'dd MMM') + ' - ' + #temporals.format(request.endDate, 'dd MMM yyyy')}">13 May - 17 May 2026</td>
                <td style="padding:14px 16px;"><span class="badge" th:classappend="${request.status.name() == 'APPROVED'} ? ' badge-green' : (${request.status.name() == 'REJECTED'} ? ' badge-red' : ' badge-amber')" th:text="${request.status}">PENDING</span></td>
                <td style="padding:14px 16px;text-align:right;" th:if="${request.status.name() == 'PENDING'}">
                    <button type="button" class="btn-secondary leave-approve-btn" th:data-id="${request.id}" style="font-size:12px;padding:5px 10px;">Approve</button>
                    <button type="button" class="btn-danger leave-reject-btn" th:data-id="${request.id}" style="font-size:12px;padding:5px 10px;">Reject</button>
                </td>
                <td style="padding:14px 16px;text-align:right;" th:if="${request.status.name() != 'PENDING'}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <script>
        document.getElementById('leave-apply-btn').addEventListener('click', async () => {
            const employeeId = document.getElementById('leaveEmployeeId').value;
            const leaveTypeId = document.getElementById('leaveTypeId').value;
            const startDate = document.getElementById('leaveStartDate').value;
            const endDate = document.getElementById('leaveEndDate').value;
            const reason = document.getElementById('leaveReason').value.trim();
            if (!employeeId || !leaveTypeId || !startDate || !endDate || !reason) return showToast('Complete the leave request form.', 'error');
            const url = `/api/leave/requests?employeeId=${employeeId}&leaveTypeId=${leaveTypeId}&startDate=${startDate}&endDate=${endDate}&reason=${encodeURIComponent(reason)}`;
            const res = await apiCall(url, { method: 'POST' });
            const data = await res.json();
            if (!res.ok) return showToast(data.error || data.message || 'Request failed.', 'error');
            showToast('Leave request submitted.', 'success');
            setTimeout(() => window.location.reload(), 500);
        });

        document.querySelectorAll('.leave-approve-btn').forEach(button => button.addEventListener('click', async () => {
            const res = await apiCall(`/api/leave/requests/${button.dataset.id}/approve`, { method: 'POST' });
            const data = await res.json();
            if (!res.ok) return showToast(data.error || data.message || 'Approval failed.', 'error');
            showToast('Leave approved.', 'success');
            setTimeout(() => window.location.reload(), 500);
        }));

        document.querySelectorAll('.leave-reject-btn').forEach(button => button.addEventListener('click', async () => {
            const reason = window.prompt('Reason for rejection');
            if (!reason) return;
            const res = await apiCall(`/api/leave/requests/${button.dataset.id}/reject?reason=${encodeURIComponent(reason)}`, { method: 'POST' });
            const data = await res.json();
            if (!res.ok) return showToast(data.error || data.message || 'Rejection failed.', 'error');
            showToast('Leave rejected.', 'success');
            setTimeout(() => window.location.reload(), 500);
        }));
    </script>
</div>
</body>
</html>
