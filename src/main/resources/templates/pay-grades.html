<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}" lang="en">
<head><title>Pay Grades</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <div>
            <h1 class="page-title">Pay Grades</h1>
            <p class="page-subtitle">Maintain pay bands, salaries, and fixed allowances.</p>
        </div>
        <button class="btn-primary" onclick="document.getElementById('pay-grade-modal').style.display='flex'">Add Pay Grade</button>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;">
        <div class="card" th:each="grade : ${payGrades}" style="padding:20px;">
            <div style="display:flex;justify-content:space-between;gap:12px;">
                <div>
                    <div style="font-size:12px;color:#64748b;text-transform:uppercase;">Grade</div>
                    <div style="font-size:22px;font-weight:600;margin-top:6px;" th:text="${grade.name}">A1</div>
                </div>
                <span class="badge" th:classappend="${grade.active} ? ' badge-green' : ' badge-gray'" th:text="${grade.active} ? 'Active' : 'Inactive'">Active</span>
            </div>
            <div style="margin-top:18px;display:grid;gap:8px;font-size:13px;">
                <div style="display:flex;justify-content:space-between;"><span style="color:#64748b;">Basic</span><strong th:text="${'₦' + #numbers.formatDecimal(grade.basicSalary / 100, 0, 'COMMA', 0, 'POINT')}">₦0</strong></div>
                <div style="display:flex;justify-content:space-between;"><span style="color:#64748b;">Housing</span><strong th:text="${'₦' + #numbers.formatDecimal(grade.housingAllowance / 100, 0, 'COMMA', 0, 'POINT')}">₦0</strong></div>
                <div style="display:flex;justify-content:space-between;"><span style="color:#64748b;">Transport</span><strong th:text="${'₦' + #numbers.formatDecimal(grade.transportAllowance / 100, 0, 'COMMA', 0, 'POINT')}">₦0</strong></div>
                <div style="display:flex;justify-content:space-between;"><span style="color:#64748b;">Other</span><strong th:text="${'₦' + #numbers.formatDecimal(grade.otherAllowances / 100, 0, 'COMMA', 0, 'POINT')}">₦0</strong></div>
            </div>
            <button type="button" class="btn-secondary grade-edit-btn" th:data-id="${grade.id}" th:data-name="${grade.name}" th:data-basic="${grade.basicSalary}" th:data-housing="${grade.housingAllowance}" th:data-transport="${grade.transportAllowance}" th:data-other="${grade.otherAllowances}" style="margin-top:18px;width:100%;justify-content:center;">Edit</button>
        </div>
    </div>

    <div id="pay-grade-modal" style="display:none;position:fixed;inset:0;background:rgba(15,23,42,0.45);z-index:50;align-items:center;justify-content:center;">
        <div class="card" style="width:min(560px,92vw);padding:24px;">
            <h2 style="margin:0 0 14px;font-size:18px;">Pay Grade</h2>
            <input type="hidden" id="gradeId">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                <div style="grid-column:1 / -1;"><label class="form-label">Name</label><input class="form-input" id="gradeName"></div>
                <div><label class="form-label">Basic Salary (kobo)</label><input class="form-input" id="basicSalary" type="number"></div>
                <div><label class="form-label">Housing Allowance (kobo)</label><input class="form-input" id="housingAllowance" type="number"></div>
                <div><label class="form-label">Transport Allowance (kobo)</label><input class="form-input" id="transportAllowance" type="number"></div>
                <div><label class="form-label">Other Allowances (kobo)</label><input class="form-input" id="otherAllowances" type="number"></div>
            </div>
            <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:18px;">
                <button class="btn-secondary" onclick="document.getElementById('pay-grade-modal').style.display='none'">Cancel</button>
                <button class="btn-primary" id="grade-save-btn">Save</button>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.grade-edit-btn').forEach(button => {
            button.addEventListener('click', () => {
                document.getElementById('gradeId').value = button.dataset.id;
                document.getElementById('gradeName').value = button.dataset.name;
                document.getElementById('basicSalary').value = button.dataset.basic;
                document.getElementById('housingAllowance').value = button.dataset.housing;
                document.getElementById('transportAllowance').value = button.dataset.transport;
                document.getElementById('otherAllowances').value = button.dataset.other;
                document.getElementById('pay-grade-modal').style.display = 'flex';
            });
        });

        document.getElementById('grade-save-btn').addEventListener('click', async () => {
            const id = document.getElementById('gradeId').value;
            const payload = {
                name: document.getElementById('gradeName').value.trim(),
                basicSalary: Number(document.getElementById('basicSalary').value || 0),
                housingAllowance: Number(document.getElementById('housingAllowance').value || 0),
                transportAllowance: Number(document.getElementById('transportAllowance').value || 0),
                otherAllowances: Number(document.getElementById('otherAllowances').value || 0)
            };
            const res = await apiCall(id ? `/api/pay-grades/${id}` : '/api/pay-grades', {
                method: id ? 'PUT' : 'POST',
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (!res.ok) return showToast(data.error || data.message || 'Save failed.', 'error');
            showToast('Pay grade saved.', 'success');
            setTimeout(() => window.location.reload(), 500);
        });
    </script>
</div>
</body>
</html>
