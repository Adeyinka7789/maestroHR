<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Employee Dashboard</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <div>
            <h1 class="page-title">Welcome, <span th:text="${employee.firstName}">Employee</span>!</h1>
            <p class="page-subtitle">Employee Dashboard</p>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="stat-card">
            <div style="display:flex;align-items:center;gap:12px;">
                <div style="width:48px;height:48px;background:#dbeafe;border-radius:12px;display:flex;align-items:center;justify-content:center;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </div>
                <div>
                    <p style="font-size:13px;color:#6b7280;">Leave Balance</p>
                    <p style="font-size:28px;font-weight:700;color:#111827;" th:text="${leaveBalance != null ? leaveBalance.daysRemaining : '—'}">—</p>
                </div>
            </div>
        </div>
        <div class="stat-card">
            <div style="display:flex;align-items:center;gap:12px;">
                <div style="width:48px;height:48px;background:#dcfce7;border-radius:12px;display:flex;align-items:center;justify-content:center;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <div>
                    <p style="font-size:13px;color:#6b7280;">Pending Requests</p>
                    <p style="font-size:28px;font-weight:700;color:#111827;" th:text="${pendingRequests.size()}">0</p>
                </div>
            </div>
        </div>
        <div class="stat-card">
            <div style="display:flex;align-items:center;gap:12px;">
                <div style="width:48px;height:48px;background:#fef3c7;border-radius:12px;display:flex;align-items:center;justify-content:center;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#92400e" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                </div>
                <div>
                    <p style="font-size:13px;color:#6b7280;">Recent Payslips</p>
                    <p style="font-size:28px;font-weight:700;color:#111827;" th:text="${recentPayslips.size()}">0</p>
                </div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
        <div class="card" style="padding:20px;">
            <h3 class="font-semibold text-gray-800 mb-4">Recent Payslips</h3>
            <div th:if="${recentPayslips.empty}" class="text-gray-500 text-center py-8">No payslips yet</div>
            <div th:each="payslip : ${recentPayslips}" class="border-b py-3 flex justify-between items-center">
                <div>
                    <p class="font-medium" th:text="${payslip.payrollRun.period}">Period</p>
                    <p class="text-sm text-gray-500" th:text="'₦' + ${#numbers.formatDecimal(payslip.netSalary / 100, 1, 2)}">Amount</p>
                </div>
                <a th:href="'/reports/payslip?employeeId=' + ${employee.id} + '&payrollRunId=' + ${payslip.payrollRun.id}" class="btn-secondary text-sm">Download</a>
            </div>
        </div>

        <div class="card" style="padding:20px;">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold text-gray-800">My Leave Requests</h3>
                <a href="/employee/leave" class="btn-primary text-sm">Request Leave</a>
            </div>
            <div th:if="${pendingRequests.empty}" class="text-gray-500 text-center py-8">No pending requests</div>
            <div th:each="req : ${pendingRequests}" class="border-b py-3">
                <p class="font-medium" th:text="${req.leaveType.name}">Leave Type</p>
                <p class="text-sm text-gray-500" th:text="${req.startDate} + ' to ' + ${req.endDate}">Dates</p>
                <span class="badge badge-amber text-xs mt-1">Pending</span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
